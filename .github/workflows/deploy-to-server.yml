name: Deploy to Server

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Docker & Compose on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io docker-compose-plugin curl
              sudo usermod -aG docker $USER
              sudo systemctl enable docker
              sudo systemctl start docker
            else
              echo "Docker already installed, skipping..."
            fi

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /home/${{ secrets.EC2_SSH_USER }}/flask-todo/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_SSH_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.EC2_SSH_USER }}/flask-todo
            export DOCKERHUB_USER=${{ vars.DOCKERHUB_USER }}
            docker pull ${{ vars.DOCKERHUB_USER }}/flask-todo:latest
            docker compose down
            docker compose up -d
            echo "✅ Flask Todo App deployed successfully!"
