version: '3.8'

services:
  todo-app:
    image: ${DOCKERHUB_USER}/flask-todo:latest
    ports:
      - "5000:5000"
    volumes:
      - todo-data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  todo-data:
